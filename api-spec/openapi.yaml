openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: VeltrixAPI - API Management Platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: api-keys
    description: API Key management
  - name: apis
    description: Managed APIs
  - name: endpoints
    description: API Endpoints
  - name: plans
    description: Plans and subscriptions
  - name: logs
    description: Request logs
  - name: analytics
    description: Analytics and metrics
  - name: webhooks
    description: Webhooks
  - name: marketplace
    description: API Marketplace

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK

  /auth/discord:
    get:
      operationId: discordAuth
      tags: [auth]
      summary: Discord OAuth URL
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string

  /auth/discord/callback:
    get:
      operationId: discordCallback
      tags: [auth]
      summary: Discord OAuth callback
      parameters:
        - name: code
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Error

  /auth/me:
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/verify-email:
    post:
      operationId: sendVerifyEmail
      tags: [auth]
      summary: Send email verification code
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /auth/verify-email/confirm:
    post:
      operationId: confirmVerifyEmail
      tags: [auth]
      summary: Confirm email verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # API Keys
  /api-keys:
    get:
      operationId: listApiKeys
      tags: [api-keys]
      summary: List API keys
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, revoked, expired]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
    post:
      operationId: createApiKey
      tags: [api-keys]
      summary: Create API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreated"

  /api-keys/{id}:
    get:
      operationId: getApiKey
      tags: [api-keys]
      summary: Get API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"
        "404":
          description: Not found
    patch:
      operationId: updateApiKey
      tags: [api-keys]
      summary: Update API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"
    delete:
      operationId: deleteApiKey
      tags: [api-keys]
      summary: Delete API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /api-keys/{id}/rotate:
    post:
      operationId: rotateApiKey
      tags: [api-keys]
      summary: Rotate API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreated"

  /api-keys/{id}/revoke:
    post:
      operationId: revokeApiKey
      tags: [api-keys]
      summary: Revoke API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"

  /api-keys/{id}/usage:
    get:
      operationId: getApiKeyUsage
      tags: [api-keys]
      summary: Get API key usage stats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyUsage"

  # Managed APIs
  /apis:
    get:
      operationId: listApis
      tags: [apis]
      summary: List managed APIs
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, deprecated]
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ManagedApi"
    post:
      operationId: createApi
      tags: [apis]
      summary: Create managed API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManagedApiInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedApi"

  /apis/{id}:
    get:
      operationId: getApi
      tags: [apis]
      summary: Get managed API
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedApi"
        "404":
          description: Not found
    patch:
      operationId: updateApi
      tags: [apis]
      summary: Update managed API
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManagedApiUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedApi"
    delete:
      operationId: deleteApi
      tags: [apis]
      summary: Delete managed API
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /apis/{id}/publish:
    post:
      operationId: publishApi
      tags: [apis]
      summary: Publish API
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedApi"

  /apis/{id}/endpoints:
    get:
      operationId: listApiEndpoints
      tags: [endpoints]
      summary: List endpoints of an API
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiEndpoint"
    post:
      operationId: createApiEndpoint
      tags: [endpoints]
      summary: Create endpoint
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiEndpointInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEndpoint"

  /apis/{id}/endpoints/{endpointId}:
    patch:
      operationId: updateApiEndpoint
      tags: [endpoints]
      summary: Update endpoint
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: endpointId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiEndpointUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEndpoint"
    delete:
      operationId: deleteApiEndpoint
      tags: [endpoints]
      summary: Delete endpoint
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: endpointId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Plans
  /plans:
    get:
      operationId: listPlans
      tags: [plans]
      summary: List plans
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"
    post:
      operationId: createPlan
      tags: [plans]
      summary: Create plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"

  /plans/{id}:
    patch:
      operationId: updatePlan
      tags: [plans]
      summary: Update plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
    delete:
      operationId: deletePlan
      tags: [plans]
      summary: Delete plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Logs
  /logs:
    get:
      operationId: listLogs
      tags: [logs]
      summary: List request logs
      parameters:
        - name: apiKeyId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [success, error, rate_limited]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogList"

  # Analytics
  /analytics/dashboard:
    get:
      operationId: getDashboardStats
      tags: [analytics]
      summary: Get dashboard overview stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /analytics/requests:
    get:
      operationId: getRequestTimeSeries
      tags: [analytics]
      summary: Get request time series data
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [1h, 24h, 7d, 30d]
            default: 24h
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeSeriesPoint"

  /analytics/top-apis:
    get:
      operationId: getTopApis
      tags: [analytics]
      summary: Get top APIs by request count
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiStat"

  /analytics/status-breakdown:
    get:
      operationId: getStatusBreakdown
      tags: [analytics]
      summary: Get request status breakdown
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusBreakdown"

  # Webhooks
  /webhooks:
    get:
      operationId: listWebhooks
      tags: [webhooks]
      summary: List webhooks
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Webhook"
    post:
      operationId: createWebhook
      tags: [webhooks]
      summary: Create webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"

  /webhooks/{id}:
    patch:
      operationId: updateWebhook
      tags: [webhooks]
      summary: Update webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
    delete:
      operationId: deleteWebhook
      tags: [webhooks]
      summary: Delete webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /webhooks/{id}/test:
    post:
      operationId: testWebhook
      tags: [webhooks]
      summary: Send test event to webhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookTestResult"

  # Marketplace
  /marketplace:
    get:
      operationId: listMarketplace
      tags: [marketplace]
      summary: List public APIs in marketplace
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceApi"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # Auth
    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, name, email, role, plan, emailVerified, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, developer, viewer]
        plan:
          type: string
          enum: [free, pro, enterprise]
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time

    # API Keys
    ApiKey:
      type: object
      required: [id, name, keyPreview, permissions, status, rateLimit, requestCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        keyPreview:
          type: string
          description: Masked key e.g. vx_****abcd
        permissions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, revoked, expired]
        rateLimit:
          type: integer
          description: Requests per minute
        requestCount:
          type: integer
        lastUsedAt:
          type: ["string", "null"]
          format: date-time
        expiresAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    ApiKeyCreated:
      type: object
      required: [id, name, key, keyPreview, permissions, status, rateLimit, requestCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        key:
          type: string
          description: Full key, only shown once
        keyPreview:
          type: string
        permissions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, revoked, expired]
        rateLimit:
          type: integer
        requestCount:
          type: integer
        lastUsedAt:
          type: ["string", "null"]
          format: date-time
        expiresAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    ApiKeyInput:
      type: object
      required: [name, permissions]
      properties:
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
        rateLimit:
          type: integer
          default: 1000
        expiresAt:
          type: ["string", "null"]
          format: date-time

    ApiKeyUpdate:
      type: object
      properties:
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
        rateLimit:
          type: integer

    ApiKeyUsage:
      type: object
      required: [keyId, totalRequests, successRequests, errorRequests, rateLimitedRequests, avgLatency]
      properties:
        keyId:
          type: integer
        totalRequests:
          type: integer
        successRequests:
          type: integer
        errorRequests:
          type: integer
        rateLimitedRequests:
          type: integer
        avgLatency:
          type: number
        dailyUsage:
          type: array
          items:
            $ref: "#/components/schemas/TimeSeriesPoint"

    # Managed APIs
    ManagedApi:
      type: object
      required: [id, name, description, version, status, category, isPublic, requestCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [draft, active, deprecated]
        category:
          type: string
        isPublic:
          type: boolean
        baseUrl:
          type: ["string", "null"]
        requestCount:
          type: integer
        uptime:
          type: number
          description: Percentage 0-100
        avgLatency:
          type: number
        createdAt:
          type: string
          format: date-time

    ManagedApiInput:
      type: object
      required: [name, description, version, category]
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        category:
          type: string
        isPublic:
          type: boolean
          default: false
        baseUrl:
          type: ["string", "null"]

    ManagedApiUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        category:
          type: string
        isPublic:
          type: boolean
        baseUrl:
          type: ["string", "null"]

    # Endpoints
    ApiEndpoint:
      type: object
      required: [id, apiId, method, path, description, deprecated]
      properties:
        id:
          type: integer
        apiId:
          type: integer
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE]
        path:
          type: string
        description:
          type: string
        deprecated:
          type: boolean
        authRequired:
          type: boolean

    ApiEndpointInput:
      type: object
      required: [method, path, description]
      properties:
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE]
        path:
          type: string
        description:
          type: string
        deprecated:
          type: boolean
          default: false
        authRequired:
          type: boolean
          default: true

    ApiEndpointUpdate:
      type: object
      properties:
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE]
        path:
          type: string
        description:
          type: string
        deprecated:
          type: boolean
        authRequired:
          type: boolean

    # Plans
    Plan:
      type: object
      required: [id, name, description, price, requestLimit, rateLimit, features, isActive]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
          description: Monthly price in USD
        requestLimit:
          type: integer
          description: Requests per month
        rateLimit:
          type: integer
          description: Requests per minute
        features:
          type: array
          items:
            type: string
        isActive:
          type: boolean

    PlanInput:
      type: object
      required: [name, description, price, requestLimit, rateLimit, features]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        requestLimit:
          type: integer
        rateLimit:
          type: integer
        features:
          type: array
          items:
            type: string

    PlanUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        requestLimit:
          type: integer
        rateLimit:
          type: integer
        features:
          type: array
          items:
            type: string
        isActive:
          type: boolean

    # Logs
    RequestLog:
      type: object
      required: [id, apiKeyId, method, endpoint, statusCode, latency, timestamp]
      properties:
        id:
          type: integer
        apiKeyId:
          type: integer
        apiKeyName:
          type: string
        method:
          type: string
        endpoint:
          type: string
        statusCode:
          type: integer
        latency:
          type: number
          description: Latency in ms
        ip:
          type: ["string", "null"]
        userAgent:
          type: ["string", "null"]
        timestamp:
          type: string
          format: date-time

    LogList:
      type: object
      required: [logs, total]
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/RequestLog"
        total:
          type: integer

    # Analytics
    DashboardStats:
      type: object
      required: [totalRequests, successRate, avgLatency, activeApiKeys, activeApis, totalUsers, requestsToday, uptime]
      properties:
        totalRequests:
          type: integer
        successRate:
          type: number
        avgLatency:
          type: number
        activeApiKeys:
          type: integer
        activeApis:
          type: integer
        totalUsers:
          type: integer
        requestsToday:
          type: integer
        requestsThisMonth:
          type: integer
        uptime:
          type: number
        errorRate:
          type: number
        rateLimitedRate:
          type: number

    TimeSeriesPoint:
      type: object
      required: [timestamp, value]
      properties:
        timestamp:
          type: string
        value:
          type: number
        label:
          type: ["string", "null"]

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]

    ApiStat:
      type: object
      required: [id, name, requestCount, successRate]
      properties:
        id:
          type: integer
        name:
          type: string
        requestCount:
          type: integer
        successRate:
          type: number
        avgLatency:
          type: number

    StatusBreakdown:
      type: object
      required: [success, error, rateLimited, total]
      properties:
        success:
          type: integer
        error:
          type: integer
        rateLimited:
          type: integer
        total:
          type: integer

    # Webhooks
    Webhook:
      type: object
      required: [id, url, events, status, createdAt]
      properties:
        id:
          type: integer
        url:
          type: string
        events:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive, failing]
        secret:
          type: ["string", "null"]
        deliveryCount:
          type: integer
        failureCount:
          type: integer
        lastDeliveredAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    WebhookInput:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
        events:
          type: array
          items:
            type: string
        secret:
          type: ["string", "null"]

    WebhookUpdate:
      type: object
      properties:
        url:
          type: string
        events:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive]

    WebhookTestResult:
      type: object
      required: [success, statusCode, latency]
      properties:
        success:
          type: boolean
        statusCode:
          type: integer
        latency:
          type: number
        error:
          type: ["string", "null"]

    # Marketplace
    MarketplaceApi:
      type: object
      required: [id, name, description, category, version, requestCount, rating, isVerified, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        category:
          type: string
        version:
          type: string
        requestCount:
          type: integer
        rating:
          type: number
        reviewCount:
          type: integer
        isVerified:
          type: boolean
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
